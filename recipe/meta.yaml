{% set name = "pdm-backend" %}
{% set version = "2.4.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pdm_backend-{{ version }}.tar.gz
  sha256: 5dd9cd581a4f18d57ff506a5b3aad7c8df31e5949b6fd854bbc34c38107e4532
  patches:
    - fix_git_for_tests.patch

build:
  number: 0
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    # "pdm-backend" bootstraps itself using its own code, so we need to have the runtime dependencies at build time
    - importlib-metadata >=3.6  # [py<310]
  run:
    - python
    - importlib-metadata >=3.6  # [py<310]

test:
  imports:
    - pdm.backend
  source_files:
    - tests/
    - pyproject.toml
  requires:
    - {{ stdlib('c') }}  # [linux or win]
    - {{ compiler('c') }}  # [linux or win]
    - git  # [linux or win]
    - editables
    - pip
    - pytest
    - pytest-xdist
  commands:
    - pip check
    - pytest tests -k "not test__get_version_from_scm"

about:
  home: https://pdm-backend.fming.dev/
  summary: The build backend used by PDM that supports latest packaging standards.
  description: |
    The build backend used by PDM that supports latest packaging standards.
    This is the backend for PDM projects that is fully-compatible with PEP 517 spec,
    but you can also use it alone. It reads the metadata of PEP 621 format and coverts it to Core metadata.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/pdm-project/pdm-backend
  doc_url: https://pdm-backend.fming.dev/

extra:
  recipe-maintainers:
    - theAeon
    - xhochy
